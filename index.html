<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samyak Bhadke · Android & Web Developer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>

    /* ─── Reset & Base ─────────────────────────────────────────────────────── */

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #000;
      color: #fff;
      font-family: "Poppins", sans-serif;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    ::selection { background: rgba(255, 255, 255, 0.15); }

    /* ─── Keyframe Animations ──────────────────────────────────────────────── */

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(120px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(-120px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(70px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes iconSpin {
      to { opacity: 1; transform: scale(1) rotate(0deg) translateY(0); }
    }

    @keyframes typeWidth {
      to { width: 22ch; }
    }

    @keyframes barLoad {
      to { width: 100%; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes shine {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-33.333%); }
    }

    @keyframes availableTyping {
      0%  { width: 0; }
      30% { width: 22ch; }
      80% { width: 22ch; }
      100%{ width: 0; }
    }

    @keyframes headingReveal {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes contentIn {
      from { opacity: 0; transform: translateY(32px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes lineMove {
      from { transform: translateX(-120%); }
      to   { transform: translateX(120%); }
    }

    @keyframes spinGlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(50px) scale(0.96); filter: blur(10px); }
      to   { opacity: 1; transform: translateY(0) scale(1);  filter: blur(0); }
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    @keyframes premiumShine {
      from { transform: translateX(-200%); }
      to   { transform: translateX(200%); }
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    @keyframes pingRing {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    /* ─── Welcome / Splash Screen ──────────────────────────────────────────── */

    #welcome-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #welcome-screen.hidden {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .welcome-glow-top {
      position: absolute;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 420px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
    }

    .welcome-glow-bottom {
      position: absolute;
      bottom: -150px;
      right: -80px;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
    }

    .welcome-content {
      position: relative;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 340px;
      animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .welcome-icons {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .welcome-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: scale(0.3) rotate(-140deg) translateY(60px);
      animation: iconSpin 1.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .welcome-icon:nth-child(1) { animation-delay: 0.1s; }
    .welcome-icon:nth-child(2) { animation-delay: 0.35s; }
    .welcome-icon:nth-child(3) { animation-delay: 0.6s; }

    .welcome-icon svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .welcome-words {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .welcome-line-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .welcome-word-1 {
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 900;
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateX(120px);
      animation: slideInLeft 1.1s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
    }

    .welcome-word-2 {
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 900;
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateX(-120px);
      animation: slideInRight 1.1s cubic-bezier(0.22, 1, 0.36, 1) 1.2s forwards;
    }

    .welcome-title {
      font-size: clamp(24px, 6vw, 38px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.2;
      text-align: center;
      opacity: 0;
      transform: translateY(70px);
      animation: slideUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.4s forwards;
    }

    .welcome-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeIn 1s 1.8s forwards;
    }

    .welcome-badge {
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      font-size: 11px;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.7);
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.5s 2s forwards;
    }

    .welcome-badge-text {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      animation: typeWidth 2s ease-in-out 2.2s forwards;
    }

    .welcome-cursor {
      animation: blink 0.5s infinite;
    }

    .welcome-progress-wrap {
      margin-top: 40px;
      width: 240px;
      height: 2px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 100px;
      overflow: hidden;
    }

    .welcome-progress-bar {
      height: 100%;
      background: #fff;
      width: 10%;
      animation: barLoad 6.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ─── Navigation ───────────────────────────────────────────────────────── */

    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      backdrop-filter: blur(20px);
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-name {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
      font-weight: 500;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 40px;
      list-style: none;
    }

    .nav-links li {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }

    .nav-links li::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      height: 1px;
      width: 0;
      background: #fff;
      transition: width 0.3s;
    }

    .nav-links li:hover {
      color: #fff;
    }

    .nav-links li:hover::after {
      width: 100%;
    }

    .nav-clock {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
    }

    .nav-hamburger {
      display: none;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 4px;
    }

    /* ─── Mobile Menu ──────────────────────────────────────────────────────── */

    #mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    #mobile-menu.open {
      display: flex;
    }

    .mobile-menu-time {
      position: absolute;
      top: 120px;
      text-align: center;
    }

    .mobile-menu-time p {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.3em;
      margin-bottom: 8px;
    }

    .mobile-menu-time h2 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.15em;
    }

    .mobile-menu-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-family: "Poppins", sans-serif;
      position: relative;
    }

    .mobile-menu-btn::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -8px;
      height: 1px;
      width: 0;
      background: #fff;
      transition: width 0.3s;
    }

    .mobile-menu-btn:hover::after {
      width: 100%;
    }

    /* ─── Hero Section ─────────────────────────────────────────────────────── */

    #home {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 640px;
      overflow: hidden;
      background: #000;
    }

    .hero-bg-image {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-bg-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    .hero-overlay {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 96px 48px 40px;
    }

    .hero-name {
      font-size: clamp(80px, 22vw, 13rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 0.85;
      cursor: pointer;
      text-transform: uppercase;
      user-select: none;
      transition: all 0.3s;
    }

    /* Three colour modes — user clicks to cycle */
    .hero-name.mode-0 {
      background: linear-gradient(to bottom, #fff, #999, #555, #000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-name.mode-1 {
      -webkit-text-fill-color: #fff;
    }

    .hero-name.mode-2 {
      background: linear-gradient(to bottom, #000, #555, #999, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-tagline {
      position: absolute;
      top: 112px;
      right: 48px;
      text-align: right;
      font-size: clamp(24px, 4vw, 3rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: 0.02em;
    }

    .hero-tagline-text {
      background: linear-gradient(90deg, #fff, rgba(255,255,255,0.6), #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 4s linear infinite;
    }

    .hero-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-top: auto;
    }

    .hero-description {
      font-size: clamp(14px, 1.5vw, 1.1rem);
      line-height: 1.6;
      max-width: 420px;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, #fff, rgba(255,255,255,0.6), #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 4s linear infinite;
    }

    .hero-description em {
      font-style: normal;
      -webkit-text-fill-color: #fff;
    }

    .hero-github-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 12px 24px;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      background: none;
      font-family: "Poppins", sans-serif;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }

    .hero-github-btn:hover {
      background: #fff;
      color: #000;
    }

    .hero-github-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ─── Marquee Ticker ───────────────────────────────────────────────────── */

    .marquee-strip {
      background: #000;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px 0;
      overflow: hidden;
    }

    .marquee-track {
      display: flex;
      align-items: center;
      gap: 64px;
      white-space: nowrap;
      animation: marquee 10s linear infinite;
    }

    .marquee-word {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 500;
    }

    /* ─── About Section ────────────────────────────────────────────────────── */

    #about {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: #000;
      color: #fff;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      padding: 64px 80px 80px;
      user-select: none;
    }

    .about-text-content {
      position: relative;
      z-index: 10;
      max-width: 640px;
    }

    .available-tag {
      display: inline-flex;
      align-items: center;
      margin-bottom: 24px;
      height: 20px;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      font-family: monospace;
      overflow: hidden;
    }

    .available-tag-text {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      animation: availableTyping 6s ease-in-out infinite;
    }

    .available-tag-cursor {
      animation: blink 0.8s infinite;
      color: rgba(255, 255, 255, 0.6);
      font-family: monospace;
    }

    .about-heading-line-1 {
      font-size: clamp(56px, 9vw, 120px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: #fff;
      opacity: 0;
      transform: scale(0.85) translateY(50px);
      animation: aboutReveal 1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .about-heading-line-2 {
      font-size: clamp(56px, 9vw, 120px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 24px;
      opacity: 0;
      transform: translateX(-80px) rotate(-4deg);
      animation: aboutRevealB 1s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
    }

    @keyframes aboutReveal {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes aboutRevealB {
      to { opacity: 1; transform: translateX(0) rotate(0); }
    }

    .about-description {
      font-size: clamp(14px, 1.5vw, 1.1rem);
      line-height: 1.75;
      max-width: 420px;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, #fff, rgba(255,255,255,0.6), #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(30px);
      animation: aboutDescIn 1s 0.6s forwards, shine 4s linear 0.6s infinite;
    }

    @keyframes aboutDescIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .about-tech-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 24px;
      opacity: 0;
      transform: translateY(20px);
      animation: aboutTagsIn 1s 0.8s forwards;
    }

    @keyframes aboutTagsIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .tech-tag {
      position: relative;
      padding: 10px 20px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .tech-tag::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: scaleX(0);
      transform-origin: left;
      background: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1), transparent);
      transition: transform 0.3s;
    }

    .tech-tag:hover::before {
      transform: scaleX(1);
    }

    .about-buttons {
      margin-top: 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      opacity: 0;
      transform: translateY(20px);
      animation: aboutTagsIn 1s 0.9s forwards;
    }

    .btn-usn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: rgba(255, 255, 255, 0.9);
      padding: 12px 24px;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      background: none;
      font-family: "Poppins", sans-serif;
      border-radius: 100px;
      tran
